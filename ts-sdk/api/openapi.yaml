openapi: 3.1.0
info:
  title: DefiTuna API
  description: Public API for DefiTuna protocol
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
paths:
  /v1/users/{user_address}/lending-positions:
    get:
      tags:
      - users_lending_positions
      summary: Request all user lending positions
      operationId: get_lending_positions
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of lending positions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Vec_LendingPositionDto'
        '400':
          description: Invalid user address
        '500':
          description: Internal error
  /v1/users/{user_address}/lending-positions/{lending_position_address}:
    get:
      tags:
      - users_lending_positions
      summary: Request lending position data by position address
      operationId: get_lending_position
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      - name: lending_position_address
        in: path
        description: Lending position address (base58)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Lending position found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Option_LendingPositionDto'
        '400':
          description: Invalid position address
        '500':
          description: Internal error
  /v1/users/{user_address}/limit-orders:
    get:
      tags:
      - users_limit_orders
      summary: Request all user limit orders
      operationId: get_limit_orders
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      - name: pool
        in: query
        description: List of pool public keys to filter by
        required: false
        schema:
          type: array
          items:
            type: string
          uniqueItems: true
        style: form
        explode: false
      - name: status
        in: query
        description: List of limit order statuses to filter by
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/LimitOrderStatus'
          uniqueItems: true
        style: form
        explode: false
      - name: opened_at_from
        in: query
        description: Filter limit orders from timestamp (Unix timestamp format)
        required: false
        schema:
          type: integer
          format: int64
      - name: opened_at_to
        in: query
        description: Filter limit orders to timestamp (Unix timestamp format)
        required: false
        schema:
          type: integer
          format: int64
      - name: cursor
        in: query
        description: Cursor for pagination (id field)
        required: false
        schema:
          type: string
      - name: desc
        in: query
        description: 'Descending order flag (default: true)'
        required: false
        schema:
          type: boolean
      - name: limit
        in: query
        description: 'Limit number of returned limit orders (default: 100, max: 500)'
        required: false
        schema:
          type: integer
          minimum: 0
      responses:
        '200':
          description: List of lending positions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Vec_LimitOrderDto'
        '400':
          description: Invalid user address
        '500':
          description: Internal error
  /v1/users/{user_address}/limit-orders/{limit_order_address}:
    get:
      tags:
      - users_limit_orders
      summary: Request limit order data by position address
      operationId: get_limit_order
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      - name: limit_order_address
        in: path
        description: Limit order address (base58)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Limit order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Option_LimitOrderDto'
        '400':
          description: Invalid position address
        '500':
          description: Internal error
  /v1/users/{user_address}/order-history:
    get:
      tags:
      - users_order_history
      summary: Request user order history
      operationId: get_order_history
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      - name: pool
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          uniqueItems: true
        style: form
        explode: false
      - name: order_type
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/OrderHistoryType'
          uniqueItems: true
        style: form
        explode: false
      - name: ui_direction
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/OrderHistoryUIDirection'
          uniqueItems: true
        style: form
        explode: false
      - name: cursor
        in: query
        description: |-
          Cursor is the pagination point to start fetching from.

            - Descending (asc = false): Returns records with ts <= cursor (i.e. earlier or at).
            - Ascending  (asc = true):  Returns records with ts >= cursor (i.e. later or at).
        required: false
        schema:
          type: string
          format: uuid
      - name: until
        in: query
        description: |-
          "Until" is an optional range limit to trim the results.

            - Descending: Only includes records with ts >= until (i.e. not too old).
            - Ascending:  Only includes records with ts <= until (i.e. not too new).
        required: false
        schema:
          type: string
          format: uuid
      - name: desc
        in: query
        description: |-
          Desc defines the sort direction of results.

            - If false:  Ascending (oldest → newest).
            - If true:   Descending (newest → oldest, default).
        required: false
        schema:
          type: boolean
      - name: limit
        in: query
        description: 'Limit defines the maximum number of results to return (default: 100, max: 500)'
        required: false
        schema:
          type: integer
          minimum: 0
      responses:
        '200':
          description: List of order history entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Vec_OrderHistoryEntryDto'
        '400':
          description: Invalid user address
        '500':
          description: Internal error
  /v1/users/{user_address}/spot-positions:
    get:
      tags:
      - users_spot_positions
      summary: Request all user spot positions
      operationId: get_spot_positions
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of spot positions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Vec_TunaSpotPositionDto'
        '400':
          description: Invalid user address
        '500':
          description: Internal error
  /v1/users/{user_address}/spot-positions/{spot_position_address}:
    get:
      tags:
      - users_spot_positions
      summary: Request spot position data by position address
      operationId: get_spot_position
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      - name: spot_position_address
        in: path
        description: Spot position address (base58)
        required: true
        schema:
          type: string
      - name: tuna_spot_position_address
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Spot position found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_TunaSpotPositionDto'
        '400':
          description: Invalid position address
        '404':
          description: Position not found
        '500':
          description: Internal error
  /v1/users/{user_address}/staking-position:
    get:
      tags:
      - users_staking_positions
      summary: Request user staking position
      operationId: get_staking_position
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Staking position found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_StakingPositionDto'
        '400':
          description: Invalid user address
        '500':
          description: Internal error
  /v1/users/{user_address}/staking-position/history:
    get:
      tags:
      - users_staking_positions
      summary: Request user staking position history
      operationId: get_staking_position_history
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Staking position found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Vec_StakingPositionActionDto'
        '400':
          description: Invalid user address
        '500':
          description: Internal error
  /v1/users/{user_address}/trade-history:
    get:
      tags:
      - users_trade_history
      summary: Request user trade history
      operationId: get_trade_history
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      - name: pool
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
          uniqueItems: true
        style: form
        explode: false
      - name: action
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/TradeHistoryAction'
          uniqueItems: true
        style: form
        explode: false
      - name: ui_direction
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/TradeHistoryUIDirection'
          uniqueItems: true
        style: form
        explode: false
      - name: cursor
        in: query
        description: |-
          Cursor is the pagination point to start fetching from.

            - Descending (asc = false): Returns records with ts <= cursor (i.e. earlier or at).
            - Ascending  (asc = true):  Returns records with ts >= cursor (i.e. later or at).
        required: false
        schema:
          type: string
          format: uuid
      - name: until
        in: query
        description: |-
          "Until" is an optional range limit to trim the results.

            - Descending: Only includes records with ts >= until (i.e. not too old).
            - Ascending:  Only includes records with ts <= until (i.e. not too new).
        required: false
        schema:
          type: string
          format: uuid
      - name: desc
        in: query
        description: |-
          Desc defines the sort direction of results.

            - If false:  Ascending (oldest → newest).
            - If true:   Descending (newest → oldest, default).
        required: false
        schema:
          type: boolean
      - name: limit
        in: query
        description: 'Limit defines the maximum number of results to return (default: 100, max: 500)'
        required: false
        schema:
          type: integer
          minimum: 0
      responses:
        '200':
          description: List of trade history entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Vec_TradeHistoryEntryDto'
        '400':
          description: Invalid user address
        '500':
          description: Internal error
  /v1/users/{user_address}/tuna-positions:
    get:
      tags:
      - users_lp_positions
      summary: Request all user LP positions
      operationId: get_tuna_positions
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of LP positions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Vec_TunaPositionDto'
        '400':
          description: Invalid user address
        '500':
          description: Internal error
  /v1/users/{user_address}/tuna-positions/{position_address}:
    get:
      tags:
      - users_lp_positions
      summary: Request LP position data by position address
      operationId: get_tuna_position
      parameters:
      - name: user_address
        in: path
        description: Authority address (base58)
        required: true
        schema:
          type: string
      - name: position_address
        in: path
        description: LP position address (base58)
        required: true
        schema:
          type: string
      - name: tuna_position_address
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: LP position found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericHttpResponse_Option_TunaPositionDto'
        '400':
          description: Invalid position address
        '500':
          description: Internal error
components:
  schemas:
    FeeAmountWithUsd:
      type: object
      required:
      - amount
      - usd
      properties:
        amount:
          type: integer
          format: int64
        usd:
          type: number
          format: double
    GenericHttpResponse_Option_LendingPositionDto:
      type: object
      required:
      - data
      properties:
        data:
          oneOf:
          - type: 'null'
          - type: object
            required:
            - address
            - authority
            - shares
            - funds
            - earned
            - mint
            - vault
            - updated_at_slot
            properties:
              address:
                type: string
                format: pubkey
                description: Solana public key (base58)
              authority:
                type: string
                format: pubkey
                description: Solana public key (base58)
              earned:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              funds:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              mint:
                type: string
                format: pubkey
                description: Solana public key (base58)
              shares:
                type: string
                format: uint64
                description: Unsigned 64-bit integer encoded as a decimal string
              updated_at_slot:
                type: string
                format: uint64
                description: Unsigned 64-bit integer encoded as a decimal string
              vault:
                type: string
                format: pubkey
                description: Solana public key (base58)
    GenericHttpResponse_Option_LimitOrderDto:
      type: object
      required:
      - data
      properties:
        data:
          oneOf:
          - type: 'null'
          - type: object
            required:
            - id
            - address
            - order_mint
            - authority
            - pool
            - mint_a
            - mint_b
            - state
            - fill_ratio
            - a_to_b
            - tick_index
            - open_tx_signature
            - amount_in
            - amount_out
            - opened_at
            properties:
              a_to_b:
                type: boolean
              address:
                type: string
                format: pubkey
                description: Solana public key (base58)
              amount_in:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              amount_out:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              authority:
                type: string
                format: pubkey
                description: Solana public key (base58)
              close_tx_signature:
                type:
                - string
                - 'null'
              closed_at:
                type:
                - string
                - 'null'
                format: date-time
              fill_ratio:
                type: number
                format: double
              id:
                type: string
              mint_a:
                $ref: '#/components/schemas/MintDto'
              mint_b:
                $ref: '#/components/schemas/MintDto'
              open_tx_signature:
                type: string
              opened_at:
                type: string
                format: date-time
              order_mint:
                type: string
                format: pubkey
                description: Solana public key (base58)
              pool:
                $ref: '#/components/schemas/TunaPositionPool'
              state:
                $ref: '#/components/schemas/LimitOrderStatus'
              tick_index:
                type: integer
                format: int32
    GenericHttpResponse_Option_TunaPositionDto:
      type: object
      required:
      - data
      properties:
        data:
          oneOf:
          - type: 'null'
          - type: object
            required:
            - address
            - authority
            - version
            - state
            - position_mint
            - liquidity
            - tick_lower_index
            - tick_upper_index
            - lower_limit_order_price
            - upper_limit_order_price
            - entry_price
            - flags
            - mint_a
            - mint_b
            - pool
            - market_maker
            - deposited_collateral_a
            - deposited_collateral_b
            - leverage
            - max_leverage
            - liquidation_price_lower
            - liquidation_price_upper
            - initial_debt_a
            - initial_debt_b
            - current_debt_a
            - current_debt_b
            - leftovers_a
            - leftovers_b
            - yield_a
            - yield_b
            - compounded_yield_a
            - compounded_yield_b
            - total_a
            - total_b
            - pnl_a
            - pnl_b
            - pnl_usd
            - opened_at
            properties:
              address:
                type: string
                format: pubkey
                description: Solana public key (base58)
              authority:
                type: string
                format: pubkey
                description: Solana public key (base58)
              closed_at:
                type:
                - string
                - 'null'
                format: date-time
              compounded_yield_a:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              compounded_yield_b:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              current_debt_a:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              current_debt_b:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              deposited_collateral_a:
                $ref: '#/components/schemas/TunaPositionTokenDepositedCollateral'
              deposited_collateral_b:
                $ref: '#/components/schemas/TunaPositionTokenDepositedCollateral'
              entry_price:
                type: number
                format: double
              flags:
                $ref: '#/components/schemas/TunaLpPositionFlags'
              initial_debt_a:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              initial_debt_b:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              leftovers_a:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              leftovers_b:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              leverage:
                type: number
                format: double
              liquidation_price_lower:
                type: number
                format: double
              liquidation_price_upper:
                type: number
                format: double
              liquidity:
                type: string
                format: uint128
                description: Unsigned 128-bit integer encoded as a decimal string
              lower_limit_order_price:
                type: number
                format: double
              market_maker:
                $ref: '#/components/schemas/TunaPositionMarketMaker'
              max_leverage:
                type: number
                format: double
              mint_a:
                $ref: '#/components/schemas/MintDto'
              mint_b:
                $ref: '#/components/schemas/MintDto'
              opened_at:
                type: string
                format: date-time
              pnl_a:
                $ref: '#/components/schemas/TunaPositionTokenPnl'
                description: Total PnL denominated/expressed in token A
              pnl_b:
                $ref: '#/components/schemas/TunaPositionTokenPnl'
                description: Total PnL denominated/expressed in token B
              pnl_usd:
                $ref: '#/components/schemas/TunaPositionUsdPnl'
              pool:
                $ref: '#/components/schemas/TunaPositionPool'
              position_mint:
                type: string
                format: pubkey
                description: Solana public key (base58)
              state:
                $ref: '#/components/schemas/TunaPositionDtoState'
              tick_lower_index:
                type: integer
                format: int32
              tick_upper_index:
                type: integer
                format: int32
              total_a:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              total_b:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              upper_limit_order_price:
                type: number
                format: double
              version:
                type: integer
                format: int32
                minimum: 0
              yield_a:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              yield_b:
                $ref: '#/components/schemas/TokenAmountWithUsd'
    GenericHttpResponse_StakingPositionDto:
      type: object
      required:
      - data
      properties:
        data:
          type: object
          required:
          - address
          - owner
          - staked
          - unclaimed_reward
          - claimed_reward
          - unstaked
          - vesting
          properties:
            address:
              type: string
              format: pubkey
              description: Solana public key (base58)
            claimed_reward:
              $ref: '#/components/schemas/TokenAmountWithUsd'
            last_unstaked_at:
              type:
              - string
              - 'null'
              format: date-time
            owner:
              type: string
              format: pubkey
              description: Solana public key (base58)
            rank:
              type:
              - integer
              - 'null'
              format: int32
              minimum: 0
            staked:
              $ref: '#/components/schemas/TokenAmountWithUsd'
            unclaimed_reward:
              $ref: '#/components/schemas/TokenAmountWithUsd'
            unstaked:
              $ref: '#/components/schemas/TokenAmountWithUsd'
            vesting:
              $ref: '#/components/schemas/VestingDto'
            withdraw_available_at:
              type:
              - string
              - 'null'
              format: date-time
    GenericHttpResponse_TunaSpotPositionDto:
      type: object
      required:
      - data
      properties:
        data:
          type: object
          required:
          - address
          - authority
          - version
          - state
          - lower_limit_order_price
          - upper_limit_order_price
          - entry_price
          - mint_a
          - mint_b
          - pool
          - position_token
          - collateral_token
          - market_maker
          - deposited_collateral
          - initial_debt
          - current_debt
          - total
          - leverage
          - max_leverage
          - liquidation_price
          - pnl_usd
          - opened_at
          properties:
            address:
              type: string
              format: pubkey
              description: Solana public key (base58)
            authority:
              type: string
              format: pubkey
              description: Solana public key (base58)
            closed_at:
              type:
              - string
              - 'null'
              format: date-time
            collateral_token:
              $ref: '#/components/schemas/TunaPositionPoolToken'
            current_debt:
              $ref: '#/components/schemas/TokenAmountWithUsd'
            deposited_collateral:
              $ref: '#/components/schemas/TokenAmountWithUsd'
            entry_price:
              type: number
              format: double
            initial_debt:
              $ref: '#/components/schemas/TokenAmountWithUsd'
            leverage:
              type: number
              format: double
            liquidation_price:
              type: number
              format: double
            lower_limit_order_price:
              type: number
              format: double
            market_maker:
              $ref: '#/components/schemas/TunaPositionMarketMaker'
            max_leverage:
              type: number
              format: double
            mint_a:
              $ref: '#/components/schemas/MintDto'
            mint_b:
              $ref: '#/components/schemas/MintDto'
            opened_at:
              type: string
              format: date-time
            pnl_usd:
              $ref: '#/components/schemas/TunaPositionUsdPnl'
            pool:
              $ref: '#/components/schemas/TunaPositionPool'
            position_token:
              $ref: '#/components/schemas/TunaPositionPoolToken'
            state:
              $ref: '#/components/schemas/TunaSpotPositionDtoState'
            total:
              $ref: '#/components/schemas/TokenAmountWithUsd'
            upper_limit_order_price:
              type: number
              format: double
            version:
              type: integer
              format: int32
              minimum: 0
    GenericHttpResponse_Vec_LendingPositionDto:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            type: object
            required:
            - address
            - authority
            - shares
            - funds
            - earned
            - mint
            - vault
            - updated_at_slot
            properties:
              address:
                type: string
                format: pubkey
                description: Solana public key (base58)
              authority:
                type: string
                format: pubkey
                description: Solana public key (base58)
              earned:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              funds:
                $ref: '#/components/schemas/TokenAmountWithUsd'
              mint:
                type: string
                format: pubkey
                description: Solana public key (base58)
              shares:
                type: string
                format: uint64
